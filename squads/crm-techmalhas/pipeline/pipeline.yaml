code: crm-techmalhas
name: CRM Techmalhas Pipeline
version: "1.0.0"
description: >
  Pipeline de 13 etapas (10 de agente + 3 checkpoints) para auditar, arquitetar,
  construir, testar e entregar o CRM próprio da Techmalhas.

steps:
  - id: audit
    file: steps/step-01-audit.md
    label: Auditoria de CRMs de Referência
    agent: product-strategist

  - id: requirements
    file: steps/step-02-requirements.md
    label: Requisitos e User Stories do MVP
    agent: product-strategist

  - id: checkpoint-scope
    file: steps/step-03-checkpoint-scope.md
    label: ⏸️ Aprovar Escopo do MVP
    type: checkpoint

  - id: wireframes
    file: steps/step-04-wireframes.md
    label: Wireframes das Telas-Chave
    agent: ux-designer

  - id: design-system
    file: steps/step-05-design-system.md
    label: Design System (cores, tipografia, componentes)
    agent: ux-designer

  - id: architecture
    file: steps/step-06-architecture.md
    label: Arquitetura de Sistemas e Modelo de Dados
    agent: system-architect

  - id: checkpoint-architecture
    file: steps/step-07-checkpoint-architecture.md
    label: ⏸️ Aprovar Arquitetura
    type: checkpoint

  - id: database
    file: steps/step-08-database.md
    label: Schema PostgreSQL com Prisma
    agent: fullstack-developer

  - id: backend-api
    file: steps/step-09-backend-api.md
    label: API REST + Integração WhatsApp Cloud API
    agent: fullstack-developer

  - id: frontend
    file: steps/step-10-frontend.md
    label: Interface Next.js (Kanban, Leads, Dashboard, Chat)
    agent: fullstack-developer

  - id: integration
    file: steps/step-11-integration.md
    label: Testes End-to-End e Suite de Qualidade
    agent: qa-documentation

  - id: deploy-docs
    file: steps/step-12-deploy-docs.md
    label: Deploy Vercel + Documentação Completa
    agent: qa-documentation

  - id: checkpoint-final
    file: steps/step-13-checkpoint-final.md
    label: ⏸️ Revisão Final e Handoff
    type: checkpoint

checkpoints:
  - checkpoint-scope
  - checkpoint-architecture
  - checkpoint-final
